<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Demo App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🚀 Flask Demo App</h1>
    <p>A clean and simple Flask UI & This is a new UI & and Hello!</p>

    <div class="card">
        <h2>Add Two Numbers</h2>

        <form id="addForm">
            <input type="number" name="a" placeholder="Enter first number" required>
            <input type="number" name="b" placeholder="Enter second number" required>
            <button type="submit">Add</button>
        </form>

        <div id="result"></div>
    </div>
</div>

<script>
document.getElementById("addForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const response = await fetch("/add", {
        method: "POST",
        body: formData
    });

    const data = await response.json();
    document.getElementById("result").innerText =
        "Result: " + data.result;
});
</script>

</body>
</html>
